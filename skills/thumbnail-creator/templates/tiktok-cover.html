<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>TikTok Cover — 1080×1920</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #000000;
      font-family: 'Poppins', Arial, sans-serif;
    }

    /* Fundo — substitua src por sua imagem de cena */
    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    /* Gradiente do topo e base */
    .overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      z-index: 1;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
      z-index: 1;
    }

    /* Logo/Canal no topo */
    .channel-tag {
      position: absolute;
      top: 60px;
      left: 60px;
      z-index: 3;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 32px;
      font-weight: 700;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Conteúdo principal na parte inferior */
    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 60px 60px 200px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* Categoria / hook */
    .category {
      font-size: 30px;
      font-weight: 700;
      color: #FF3B5C;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }

    /* Headline principal */
    .headline {
      font-size: 96px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.05;
      text-shadow: 3px 3px 16px rgba(0,0,0,0.9);
      margin-bottom: 32px;
    }

    .headline .accent {
      color: #FF3B5C;
    }

    /* Subtítulo */
    .subtitle {
      font-size: 40px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }

    /* Indicador de play */
    .play-hint {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .play-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .play-text {
      font-size: 24px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <!-- IMAGEM DE FUNDO: substitua pelo frame do vídeo ou imagem de cena -->
  <!-- <img class="bg-image" src="scene-frame.jpg" alt=""> -->

  <!-- Gradientes -->
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- Tag do canal no topo — PERSONALIZE -->
  <div class="channel-tag">@seucanal</div>

  <!-- Conteúdo principal — PERSONALIZE -->
  <div class="content">
    <div class="category">🔥 Viral 2025</div>
    <div class="headline">
      O segredo que<br>
      <span class="accent">ninguém</span><br>
      te conta
    </div>
    <div class="subtitle">Você precisa saber disso</div>
  </div>

  <!-- Indicador de play -->
  <div class="play-hint">
    <div class="play-icon">▶</div>
    <div class="play-text">Assistir</div>
  </div>

</body>
</html>
