<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>YouTube Thumbnail — 1280×720</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #0A0A0A;
      font-family: 'Poppins', Arial, sans-serif;
    }

    /* Fundo — substitua src por sua imagem */
    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
    }

    /* Overlay gradiente lateral */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        rgba(0, 0, 0, 0.90) 0%,
        rgba(0, 0, 0, 0.70) 50%,
        rgba(0, 0, 0, 0.20) 100%
      );
    }

    /* Conteúdo principal */
    .content {
      position: relative;
      z-index: 2;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      max-width: 820px;
    }

    /* Label pequeno acima do título */
    .label {
      font-size: 24px;
      font-weight: 700;
      color: #FF6B35;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }

    /* Headline principal — personalize aqui */
    .headline {
      font-size: 100px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.0;
      text-shadow: 3px 3px 12px rgba(0,0,0,0.8);
    }

    .headline .accent {
      color: #FF6B35;
    }

    /* Sub-linha opcional */
    .subtitle {
      font-size: 32px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 24px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
    }

    /* Badge circular no lado direito */
    .badge {
      position: absolute;
      z-index: 3;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      height: 220px;
      background: #FF6B35;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255, 107, 53, 0.5);
    }

    .badge-number {
      font-size: 80px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1;
    }

    .badge-label {
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Barra inferior de destaque */
    .bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, #FF6B35, #FFD700, #FF6B35);
    }
  </style>
</head>
<body>

  <!-- IMAGEM DE FUNDO: substitua o src pelo path da imagem de fundo -->
  <!-- <img class="bg-image" src="background.jpg" alt=""> -->

  <!-- Gradiente escuro -->
  <div class="overlay"></div>

  <!-- Conteúdo — PERSONALIZE AQUI -->
  <div class="content">
    <div class="label">TUTORIAL</div>
    <div class="headline">
      Como Fazer<br>
      <span class="accent">Isso</span> em<br>
      5 Passos
    </div>
    <div class="subtitle">Sem precisar de experiência</div>
  </div>

  <!-- Badge numérico — PERSONALIZE: número e label -->
  <div class="badge">
    <div class="badge-number">5</div>
    <div class="badge-label">PASSOS</div>
  </div>

  <!-- Barra decorativa -->
  <div class="bar"></div>

</body>
</html>
